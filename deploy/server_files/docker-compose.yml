services:
  murky_api:
    build: .
    restart: unless-stopped
    volumes:
      - ./deployments/current:/app
      - ./database_backups:/db_backups
      - ./secrets:/secrets
    env_file:
      - .env
    ports:
      - "8701:8080"
    depends_on:
      - murky_api_redis
  murky_api_redis:
    image: redis:latest
    restart: unless-stopped
